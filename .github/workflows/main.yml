name: Build Great White Streams APKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build phone debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Build TV debug APK
        run: ./gradlew :tv:assembleDebug --no-daemon

      - name: Build Auto (car) debug APK
        run: ./gradlew :auto:assembleDebug --no-daemon

      - name: Upload phone APK
        uses: actions/upload-artifact@v4
        with:
          name: GreatWhiteStreams-phone-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: GreatWhiteStreams-tv-apk
          path: tv/build/outputs/apk/debug/tv-debug.apk
          if-no-files-found: error

      - name: Upload Auto APK
        uses: actions/upload-artifact@v4
        with:
          name: GreatWhiteStreams-auto-apk
          path: auto/build/outputs/apk/debug/auto-debug.apk
          if-no-files-found: error
